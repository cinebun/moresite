<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .login-box h1 { text-align: center; margin-bottom: 8px; }
    .login-box p { text-align: center; color: #666; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #C9A96E;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover { background: #b8963e; }
    .error { color: #d32f2f; text-align: center; margin-top: 12px; display: none; }

    .admin-header {
      background: #1A1A1A;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-radius: 12px;
    }
    .admin-header a {
      color: #C9A96E;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-header a:hover { text-decoration: underline; }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .product-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .product-card h3 { font-size: 18px; margin-bottom: 4px; }
    .product-card .price { font-size: 20px; font-weight: 700; color: #C9A96E; margin: 8px 0; }
    .product-card .shop { font-size: 14px; color: #666; }
    .product-card .weight { font-size: 14px; color: #999; }
    .product-card .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .product-card .actions button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .product-card .actions .edit { background: #e3f2fd; color: #0d47a1; }
    .product-card .actions .delete { background: #ffebee; color: #c62828; }
    .product-card .actions .edit:hover { background: #bbdefb; }
    .product-card .actions .delete:hover { background: #ffcdd2; }
    .add-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 24px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .add-btn:hover { background: #388E3C; }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-content h2 { margin-bottom: 16px; }
    .modal-content label { display: block; font-weight: 600; margin-top: 12px; }
    .modal-content input, .modal-content textarea, .modal-content select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 4px;
    }
    .modal-content input[type="file"] {
      padding: 8px;
      background: #f9f9f9;
      cursor: pointer;
    }
    .modal-content .preview {
      margin-top: 8px;
      max-width: 200px;
      max-height: 120px;
      border-radius: 8px;
      display: none;
    }
    .modal-content .preview.active { display: block; }
    .modal-content .btn-save {
      margin-top: 16px;
      padding: 12px 24px;
      background: #C9A96E;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-content .btn-save:hover { background: #b8963e; }
    .modal-content .btn-close {
      margin-top: 8px;
      padding: 10px 24px;
      background: #ddd;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .modal-content .btn-close:hover { background: #ccc; }
    .loading { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>

<!-- СТРАНИЦА ВХОДА -->
<div id="loginPage" class="login-box">
  <h1>🔐 Вход в админку</h1>
  <p>Введите логин и пароль</p>
  <input type="text" id="loginUsername" placeholder="Логин" />
  <input type="password" id="loginPassword" placeholder="Пароль" />
  <button onclick="login()">Войти</button>
  <div id="errorMessage" class="error">Неверный логин или пароль</div>
</div>

<!-- АДМИНКА -->
<div id="adminPanel" style="display:none;">
  <div class="admin-header">
    <span>🛒 Управление товарами</span>
    <a onclick="logout()">Выйти</a>
  </div>

  <button class="add-btn" onclick="openAddModal()">➕ Добавить товар</button>

  <div id="productsContainer">
    <div class="loading">Загрузка товаров...</div>
  </div>
</div>

<!-- МОДАЛКА -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Добавить товар</h2>
    <label>Название</label>
    <input type="text" id="editName" />
    <label>Вес</label>
    <input type="text" id="editWeight" />
    <label>Цена</label>
    <input type="text" id="editPrice" />
    <label>Магазин</label>
    <select id="editShop">
      <option value="vkusvill">ВкусВилл</option>
      <option value="lavka">Яндекс Лавка</option>
      <option value="samokat">Самокат</option>
    </select>
    <label>Ссылка на товар</label>
    <input type="text" id="editLink" placeholder="https://..." />
    <label>Название магазина (для кнопки)</label>
    <input type="text" id="editShopLabel" placeholder="ВкусВилл" />
    <label>Загрузить картинку</label>
    <input type="file" id="editImageFile" accept="image/*" />
    <img id="editImagePreview" class="preview" />
    <input type="hidden" id="editImage" />

    <button class="btn-save" onclick="saveProduct()">Сохранить</button>
    <button class="btn-close" onclick="closeModal()">Отмена</button>
  </div>
</div>

<script>
  const ADMIN_USERNAME = 'da4409275@gmail.com';
  const ADMIN_PASSWORD = 'B2J-uJF-Ye5-cY6';

  let editingId = null;
  let products = [];

  // ===== ВХОД =====
  function login() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('errorMessage');

    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadProducts();
    } else {
      errorEl.style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    location.reload();
  }

  if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadProducts();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
      login();
    }
  });

  // ===== ЗАГРУЗКА ТОВАРОВ =====
  function loadProducts() {
    const container = document.getElementById('productsContainer');
    container.innerHTML = '<div class="loading">Загрузка...</div>';

    fetch('data/products.json')
      .then(res => res.json())
      .then(data => {
        products = data.products || [];
        renderProducts();
      })
      .catch(() => {
        container.innerHTML = '<div class="loading" style="color:#d32f2f;">Ошибка загрузки товаров.</div>';
      });
  }

  function renderProducts() {
    const container = document.getElementById('productsContainer');

    if (!products || products.length === 0) {
      container.innerHTML = '<div class="loading">Нет товаров. Добавьте первый!</div>';
      return;
    }

    container.innerHTML = `
      <div class="products-grid">
        ${products.map(p => `
          <div class="product-card">
            <img src="${p.image || 'https://placehold.co/300x200/eee/ccc?text=Нет+фото'}" alt="${p.name}" />
            <h3>${p.name}</h3>
            <div class="weight">${p.weight}</div>
            <div class="price">${p.price}</div>
            <div class="shop">${p.shopLabel || p.shop}</div>
            <div class="actions">
              <button class="edit" onclick="editProduct(${p.id})">✏️ Изменить</button>
              <button class="delete" onclick="deleteProduct(${p.id})">🗑️ Удалить</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // ===== ОТКРЫТИЕ МОДАЛКИ =====
  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '➕ Добавить товар';
    document.getElementById('editName').value = '';
    document.getElementById('editWeight').value = '';
    document.getElementById('editPrice').value = '';
    document.getElementById('editShop').value = 'vkusvill';
    document.getElementById('editLink').value = '';
    document.getElementById('editShopLabel').value = '';
    document.getElementById('editImage').value = '';
    document.getElementById('editImagePreview').className = 'preview';
    document.getElementById('editImagePreview').src = '';
    document.getElementById('editImageFile').value = '';
    document.getElementById('modal').classList.add('active');
  }

  function editProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '✏️ Редактировать товар';
    document.getElementById('editName').value = p.name;
    document.getElementById('editWeight').value = p.weight;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editShop').value = p.shop;
    document.getElementById('editLink').value = p.link;
    document.getElementById('editShopLabel').value = p.shopLabel || p.shop;
    document.getElementById('editImage').value = p.image;
    document.getElementById('editImageFile').value = '';
    const preview = document.getElementById('editImagePreview');
    if (p.image) {
      preview.src = p.image;
      preview.className = 'preview active';
    } else {
      preview.className = 'preview';
      preview.src = '';
    }
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  // ===== ЗАГРУЗКА КАРТИНКИ =====
  document.getElementById('editImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
      const preview = document.getElementById('editImagePreview');
      preview.src = ev.target.result;
      preview.className = 'preview active';
      // Сохраняем как base64 (для простоты)
      document.getElementById('editImage').value = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // ===== СОХРАНЕНИЕ =====
  function saveProduct() {
    const name = document.getElementById('editName').value.trim();
    const weight = document.getElementById('editWeight').value.trim();
    const price = document.getElementById('editPrice').value.trim();
    const shop = document.getElementById('editShop').value;
    const link = document.getElementById('editLink').value.trim();
    const shopLabel = document.getElementById('editShopLabel').value.trim() || shop;
    let image = document.getElementById('editImage').value.trim();

    if (!name || !weight || !price) {
      alert('Заполните название, вес и цену!');
      return;
    }

    // Если картинка не загружена, ставим заглушку
    if (!image) {
      image = 'https://placehold.co/300x200/eee/ccc?text=Нет+фото';
    }

    if (editingId !== null) {
      const idx = products.findIndex(p => p.id === editingId);
      if (idx !== -1) {
        products[idx] = { ...products[idx], name, weight, price, shop, link, shopLabel, image };
      }
    } else {
      const maxId = products.reduce((max, p) => Math.max(max, p.id), 0);
      products.push({
        id: maxId + 1,
        name,
        weight,
        price,
        shop,
        link,
        shopLabel,
        image
      });
    }

    closeModal();
    renderProducts();
    saveToJson();
  }

  function deleteProduct(id) {
    if (!confirm('Удалить товар?')) return;
    products = products.filter(p => p.id !== id);
    renderProducts();
    saveToJson();
  }

  // ===== СОХРАНЕНИЕ В JSON =====
  function saveToJson() {
    const data = { products };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'products.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    alert('✅ Файл products.json скачан! Загрузите его в папку data/ на GitHub.');
  }
</script>

</body>
</html>
