backend:
  name: git-gateway
  branch: main

site_url: https://moresiteadmin.netlify.app

media_folder: "images/products"
public_folder: "/images/products"

collections:
  - name: "products"
    label: "Товары"
    folder: "data"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "number", required: true }
      - { label: "Название", name: "name", widget: "string" }
      - { label: "Вес", name: "weight", widget: "string" }
      - { label: "Цена", name: "price", widget: "string" }
      - { label: "Категория", name: "category", widget: "string" }
      - { label: "Изображение", name: "image", widget: "image" }
      - { label: "Магазин", name: "shop", widget: "string" }
      - { label: "Ссылка", name: "link", widget: "string" }
      - { label: "Название магазина", name: "shopLabel", widget: "string" }