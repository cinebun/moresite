backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

collections:
  - name: "products"
    label: "Товары"
    folder: "data"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "name", widget: "string" }
      - { label: "Вес", name: "weight", widget: "string" }
      - { label: "Цена", name: "price", widget: "string" }
      
      - label: "Магазин"
        name: "shop"
        widget: "select"
        options:
          - { label: "ВкусВилл", value: "vkusvill" }
          - { label: "Яндекс Лавка", value: "lavka" }
          - { label: "Самокат", value: "samokat" }
      
      - { label: "Ссылка на товар", name: "link", widget: "string" }
      - { label: "Изображение", name: "image", widget: "image" }