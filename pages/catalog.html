<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — ООО МОРЕ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

    <!-- ==========================================
    ШАПКА
    ========================================== -->
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <span class="logo-text">ООО «МОРЕ»</span>
            </a>
            <nav class="nav">
                <a href="catalog.html" class="active">Каталог</a>
                <a href="about.html">О компании</a>
                <a href="contacts.html">Контакты</a>
            </nav>
            <div class="header-contacts">
                <span class="phone">+7 (905) 147-98-98</span>
                <a href="mailto:info@more.ru" class="email">info@more.ru</a>
            </div>
        </div>
    </header>

    <!-- ==========================================
    ЗАГОЛОВОК КАТАЛОГА
    ========================================== -->
    <section class="catalog-header">
        <div class="container">
            <h1>Каталог товаров</h1>
            <p>Вся продукция ООО «МОРЕ» в одном месте</p>
        </div>
    </section>

    <!-- ==========================================
    КАТАЛОГ С ФИЛЬТРАМИ
    ========================================== -->
    <section class="catalog-page">
        <div class="container">

            <!-- Фильтры -->
            <div class="catalog-filters">
                <button class="filter-btn active" data-filter="all">Все товары</button>
                <button class="filter-btn" data-filter="vkusvill">
                    <img src="../images/icons/vkusvill.png" alt="ВкусВилл" /> ВкусВилл
                </button>
                <button class="filter-btn" data-filter="lavka">
                    <img src="../images/icons/lavka.png" alt="Яндекс Лавка" /> Яндекс Лавка
                </button>
                <button class="filter-btn" data-filter="samokat">
                    <img src="../images/icons/samokat.png" alt="Самокат" /> Самокат
                </button>
            </div>

            <!-- Сетка товаров -->
            <div class="products-grid" id="catalogGrid"></div>

        </div>
    </section>

    <!-- ==========================================
    ПОДВАЛ
    ========================================== -->
    <footer class="footer">
        <div class="footer-grid">
            <div>
                <h4>ООО «МОРЕ»</h4>
                <p>ИНН: <span class="gold">9722053150</span></p>
                <p>г. Владимир</p>
            </div>
            <div>
                <h4>Контакты</h4>
                <p>+7 (905) 147-98-98</p>
                <p>info@more.ru</p>
            </div>
            <div>
                <h4>Партнёры</h4>
                <p>ВкусВилл</p>
                <p>Яндекс Лавка</p>
                <p>Самокат</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 ООО «МОРЕ». Все права защищены.</p>
        </div>
    </footer>

    <script src="../js/catalog.js"></script>
</body>
</html>
